name: seedance
version: 1.0.0
description: AI视频生成 — 火山引擎 Seedance 2.0，支持文生视频/图生视频/四模态输入
type: stdio
command: node
args: [dist/index.js]
env:
  ARK_API_KEY: ${ARK_API_KEY}
  SEEDANCE_MODEL: doubao-seedance-2-0-260128

pricing:
  free_tier: 5
  paid_tiers:
    - name: Pro
      price: 15
      currency: usd
      interval: month
      quota: 50
    - name: Pay-as-you-go
      price: 0.05
      currency: usd
      interval: per_call

tools:
  - text_to_video
  - image_to_video
  - poll_result
  - get_usage_stats

categories:
  - ai-video
  - content-creation
  - api-integration

featured: true
